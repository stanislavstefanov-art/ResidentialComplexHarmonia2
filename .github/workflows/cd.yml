name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [master]

permissions:
  id-token: write
  contents: read

env:
  RESOURCE_GROUP: rg-residence-harmonia-prod
  ACR_NAME: residenceharmoniaacr
  ACR_LOGIN_SERVER: residenceharmoniaacr.azurecr.io
  CONTAINER_APP_NAME: residenceharmonia-api

jobs:
  build-push-api:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    outputs:
      image-tag: ${{ steps.tag.outputs.image-tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: ACR login
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Set image tag
        id: tag
        run: echo "image-tag=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.ACR_LOGIN_SERVER }}/residenceharmonia-api:${{ github.event.workflow_run.head_sha }}
            ${{ env.ACR_LOGIN_SERVER }}/residenceharmonia-api:latest

  deploy-api:
    needs: [build-push-api, run-schema]
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Update Container App
        run: |
          az containerapp update \
            --name ${{ env.CONTAINER_APP_NAME }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ env.ACR_LOGIN_SERVER }}/residenceharmonia-api:${{ needs.build-push-api.outputs.image-tag }}

  deploy-angular:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/angular-prototype/package-lock.json

      - name: Install dependencies
        working-directory: ui/angular-prototype
        run: npm ci --legacy-peer-deps

      - name: Build Angular
        working-directory: ui/angular-prototype
        run: npm run build -- --configuration production

      - name: Deploy to Angular SWA
        uses: azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.ANGULAR_SWA_DEPLOY_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: ui/angular-prototype/dist/angular-prototype/browser
          skip_app_build: true

  deploy-react:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/react-prototype/package-lock.json

      - name: Install dependencies
        working-directory: ui/react-prototype
        run: npm ci

      - name: Build React
        working-directory: ui/react-prototype
        run: npm run build

      - name: Deploy to React SWA
        uses: azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.REACT_SWA_DEPLOY_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: ui/react-prototype/build
          skip_app_build: true

  run-schema:
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install sqlcmd
        run: |
          sudo apt-get update -q
          sudo ACCEPT_EULA=Y apt-get install -yq mssql-tools18 unixodbc-dev
          echo '/opt/mssql-tools18/bin' >> "$GITHUB_PATH"

      - name: Apply schema
        run: |
          CONN_STR=$(az keyvault secret show \
            --vault-name residenceharmoniakv \
            --name ConnectionStrings--Default \
            --query value -o tsv)
          echo "::add-mask::$CONN_STR"

          SQL_SERVER=$(CONN_VAR="$CONN_STR" python3 -c \
            "import os; cs=os.environ['CONN_VAR']; d={p.split('=',1)[0].strip():p.split('=',1)[1].strip() for p in cs.rstrip(';').split(';') if '=' in p}; print(d['Server'].replace('tcp:','').rsplit(',',1)[0])")

          SQL_PASS=$(CONN_VAR="$CONN_STR" python3 -c \
            "import os; cs=os.environ['CONN_VAR']; d={p.split('=',1)[0].strip():p.split('=',1)[1].strip() for p in cs.rstrip(';').split(';') if '=' in p}; print(d['Password'])")

          echo "::add-mask::$SQL_PASS"

          SQLCMDPASSWORD="$SQL_PASS" sqlcmd \
            -S "$SQL_SERVER" \
            -d residenceharmonia-db \
            -U harmonia-admin \
            -i db/schema.sql \
            -b
